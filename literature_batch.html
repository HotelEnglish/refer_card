<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文献卡片批量提取</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --surface-hover: #f2f2ef;
    --border: #e4e4e0;
    --border-strong: #c8c8c2;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b66;
    --text-muted: #9e9e98;
    --accent: #2563eb;
    --accent-bg: #eff6ff;
    --accent-border: #bfdbfe;
    --success: #16a34a;
    --success-bg: #f0fdf4;
    --success-border: #bbf7d0;
    --warning: #b45309;
    --warning-bg: #fffbeb;
    --warning-border: #fde68a;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
    --danger-border: #fecaca;
    --radius: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'Menlo', 'Monaco', 'Consolas', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
    line-height: 1.6;
  }

  .container { max-width: 760px; margin: 0 auto; }

  .header { margin-bottom: 1.75rem; }
  .header h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.4px; }
  .header p { font-size: 14px; color: var(--text-secondary); margin-top: 6px; }

  /* Config */
  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .config-panel h2 {
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px;
  }
  .config-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .config-field label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; font-weight: 500; }
  .config-field input {
    width: 100%; height: 36px; padding: 0 10px;
    border: 1px solid var(--border-strong); border-radius: var(--radius);
    font-size: 13px; font-family: var(--font-mono);
    color: var(--text-primary); background: var(--bg); outline: none;
    transition: border-color .15s;
  }
  .config-field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

  /* Timeout row */
  .config-timeout { margin-top: 10px; display: flex; align-items: center; gap: 10px; }
  .config-timeout label { font-size: 12px; color: var(--text-secondary); font-weight: 500; white-space: nowrap; }
  .config-timeout input[type=range] { flex: 1; accent-color: var(--accent); }
  .config-timeout span { font-size: 13px; font-weight: 600; color: var(--text-primary); min-width: 48px; }

  /* Notice */
  .notice {
    display: flex; gap: 8px; align-items: flex-start;
    background: var(--warning-bg); border: 1px solid var(--warning-border);
    border-radius: var(--radius); padding: 10px 12px;
    font-size: 13px; color: var(--warning); margin-bottom: 1.25rem; line-height: 1.5;
  }
  .notice svg { flex-shrink: 0; margin-top: 1px; }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed var(--border-strong); border-radius: var(--radius-lg);
    padding: 2.5rem 1.5rem; text-align: center; cursor: pointer;
    transition: border-color .15s, background .15s;
    background: var(--surface); margin-bottom: 1rem;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: var(--accent-bg); }
  .drop-zone h3 { font-size: 15px; font-weight: 500; margin-top: 10px; }
  .drop-zone p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .drop-zone input { display: none; }

  /* Queue */
  .queue { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem; }
  .queue-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .queue-item.item-error { border-color: var(--danger-border); background: var(--danger-bg); }
  .item-name {
    flex: 1; font-size: 13px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-size { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
  .item-msg { font-size: 11px; color: var(--danger); flex-shrink: 0; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; flex-shrink: 0; }
  .badge-pending  { background: #f3f4f6; color: #6b7280; }
  .badge-running  { background: var(--accent-bg); color: var(--accent); }
  .badge-done     { background: var(--success-bg); color: var(--success); }
  .badge-error    { background: var(--danger-bg); color: var(--danger); }

  .icon-btn {
    cursor: pointer; color: var(--text-muted); flex-shrink: 0;
    padding: 4px; line-height: 0; border: none; background: none; border-radius: 4px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: color .12s, background .12s;
  }
  .icon-btn:hover { color: var(--text-primary); background: var(--surface-hover); }
  .icon-btn.retry-btn:hover { color: var(--accent); background: var(--accent-bg); }
  .icon-btn.remove-btn:hover { color: var(--danger); background: var(--danger-bg); }

  /* Actions */
  .actions { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 0 16px; height: 36px; border-radius: var(--radius);
    font-size: 14px; font-weight: 500; cursor: pointer; border: none;
    transition: opacity .15s, background .15s; white-space: nowrap;
  }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: var(--text-primary); color: #fff; }
  .btn-primary:not(:disabled):hover { opacity: .85; }
  .btn-secondary { background: var(--surface); color: var(--text-primary); border: 1px solid var(--border-strong); }
  .btn-secondary:not(:disabled):hover { background: var(--surface-hover); }
  .btn-retry { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border); }
  .btn-retry:not(:disabled):hover { background: #dbeafe; }

  /* Progress */
  .progress-wrap { flex: 1; min-width: 120px; display: flex; align-items: center; gap: 10px; }
  .progress-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s ease; }
  .progress-label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }

  /* Results */
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .results-header h2 { font-size: 16px; font-weight: 600; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 8px; }
  .result-header {
    display: flex; align-items: center; gap: 8px;
    padding: 11px 14px; cursor: pointer; user-select: none;
    border-bottom: 1px solid transparent; transition: background .12s;
  }
  .result-header:hover { background: var(--surface-hover); }
  .result-header.open { border-bottom-color: var(--border); }
  .result-title { flex: 1; font-size: 13px; font-weight: 500; }
  .result-chevron { color: var(--text-muted); transition: transform .2s; flex-shrink: 0; }
  .result-chevron.open { transform: rotate(180deg); }
  .result-body {
    display: none; padding: 14px 16px;
    font-family: var(--font-mono); font-size: 12px; line-height: 1.75;
    color: var(--text-primary); white-space: pre-wrap; word-break: break-word;
    max-height: 500px; overflow-y: auto; background: #fafafa;
  }
  .result-body.open { display: block; }

  /* Spinner */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff;
    border-radius: 50%; animation: spin .65s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>文献卡片批量提取</h1>
    <p>上传多篇 PDF 论文，逐篇调用 Dify 工作流，自动生成结构化文献卡片</p>
  </div>

  <!-- Config -->
  <div class="config-panel">
    <h2>API 配置</h2>
    <div class="config-row">
      <div class="config-field">
        <label>API Base URL</label>
        <input type="text" id="apiBase" value="https://api.dify.ai/v1">
      </div>
      <div class="config-field">
        <label>API Key</label>
        <input type="text" id="apiKey" value="app-yjtOzuRM94DfJRsC5keFxPW5">
      </div>
    </div>
    <div class="config-timeout">
      <label>单篇超时</label>
      <input type="range" id="timeoutRange" min="60" max="300" step="30" value="180">
      <span id="timeoutLabel">180 秒</span>
    </div>
  </div>

  <!-- Notice -->
  <div class="notice">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    串行处理，每篇独立，失败可单独重试。若持续超时，请调大"单篇超时"或检查 PDF 文件大小。
  </div>

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#9e9e98" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:0 auto">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/>
    </svg>
    <h3>拖拽 PDF 文件到此处</h3>
    <p>或点击选择文件 · 支持多选</p>
    <input type="file" id="fileInput" accept=".pdf" multiple>
  </div>

  <!-- Queue -->
  <div class="queue" id="queue"></div>

  <!-- Actions -->
  <div class="actions" id="actions" style="display:none">
    <button class="btn btn-primary" id="btnRun">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      开始提取
    </button>
    <button class="btn btn-retry" id="btnRetryFailed" style="display:none">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.37"/>
      </svg>
      重试失败项
    </button>
    <button class="btn btn-secondary" id="btnClear">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      </svg>
      清空列表
    </button>
    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="progress-label" id="progressLabel">0 / 0</span>
    </div>
  </div>

  <!-- Results -->
  <div id="resultsSection" style="display:none">
    <div class="results-header">
      <h2>提取结果</h2>
      <button class="btn btn-secondary" id="btnExport">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        导出全部 Markdown
      </button>
    </div>
    <div id="resultsList"></div>
  </div>

</div>
<script>
// ── Config ─────────────────────────────────────────────────────────────────
const apiBaseEl    = document.getElementById('apiBase');
const apiKeyEl     = document.getElementById('apiKey');
const timeoutRange = document.getElementById('timeoutRange');
const timeoutLabel = document.getElementById('timeoutLabel');

timeoutRange.addEventListener('input', () => {
  timeoutLabel.textContent = timeoutRange.value + ' 秒';
});

function cfg() {
  return {
    base:    apiBaseEl.value.trim().replace(/\/$/, ''),
    key:     apiKeyEl.value.trim(),
    timeout: parseInt(timeoutRange.value) * 1000
  };
}

// ── State ──────────────────────────────────────────────────────────────────
let files     = [];   // { file, status, uid, errMsg }
let results   = [];   // { name, content, isError }
let isRunning = false;

// ── DOM ────────────────────────────────────────────────────────────────────
const dropZone       = document.getElementById('dropZone');
const fileInput      = document.getElementById('fileInput');
const queueEl        = document.getElementById('queue');
const actionsEl      = document.getElementById('actions');
const btnRun         = document.getElementById('btnRun');
const btnRetryFailed = document.getElementById('btnRetryFailed');
const btnClear       = document.getElementById('btnClear');
const btnExport      = document.getElementById('btnExport');
const progressWrap   = document.getElementById('progressWrap');
const progressFill   = document.getElementById('progressFill');
const progressLabel  = document.getElementById('progressLabel');
const resultsSection = document.getElementById('resultsSection');
const resultsList    = document.getElementById('resultsList');

// ── Drop / pick ────────────────────────────────────────────────────────────
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  addFiles([...e.dataTransfer.files].filter(f => f.name.endsWith('.pdf')));
});
fileInput.addEventListener('change', () => { addFiles([...fileInput.files]); fileInput.value = ''; });

function fmtSize(b) {
  return b < 1048576 ? (b/1024).toFixed(0)+' KB' : (b/1048576).toFixed(1)+' MB';
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function addFiles(newFiles) {
  let added = 0;
  newFiles.forEach(f => {
    if (!files.find(x => x.file.name === f.name && x.file.size === f.size)) {
      files.push({ file: f, status: 'pending', uid: Math.random().toString(36).slice(2), errMsg: '' });
      added++;
    }
  });
  if (added) renderQueue();
}

// ── Render queue ───────────────────────────────────────────────────────────
function renderQueue() {
  queueEl.innerHTML = '';
  let hasError = false;

  files.forEach((item, idx) => {
    if (item.status === 'error') hasError = true;

    const label = { pending:'待处理', running:'处理中', done:'完成', error:'失败' }[item.status];
    const isErr = item.status === 'error';

    const div = document.createElement('div');
    div.className = 'queue-item' + (isErr ? ' item-error' : '');
    div.innerHTML = `
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="${isErr ? 'var(--danger)' : 'var(--text-muted)'}"
           stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <span class="item-name" title="${item.file.name}">${item.file.name}</span>
      <span class="item-size">${fmtSize(item.file.size)}</span>
      ${isErr && item.errMsg ? `<span class="item-msg" title="${item.errMsg}">${item.errMsg}</span>` : ''}
      <span class="badge badge-${item.status}">${label}</span>
      ${isErr ? `
        <button class="icon-btn retry-btn" data-idx="${idx}" title="重新处理这篇" aria-label="重试">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.37"/>
          </svg>
        </button>` : ''}
      ${item.status === 'pending' ? `
        <button class="icon-btn remove-btn" data-idx="${idx}" title="移除" aria-label="移除">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>` : ''}
    `;
    queueEl.appendChild(div);
  });

  // Button visibility
  actionsEl.style.display      = files.length ? 'flex' : 'none';
  btnRetryFailed.style.display = hasError && !isRunning ? 'inline-flex' : 'none';

  // Individual retry buttons
  queueEl.querySelectorAll('.retry-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (isRunning) return;
      const idx = parseInt(btn.dataset.idx);
      files[idx].status = 'pending';
      files[idx].errMsg = '';
      renderQueue();
      await processItems([files[idx]]);
    });
  });

  // Remove buttons
  queueEl.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      files.splice(parseInt(btn.dataset.idx), 1);
      renderQueue();
    });
  });
}

// ── API ────────────────────────────────────────────────────────────────────

// Fetch with timeout using AbortController
async function fetchWithTimeout(url, options, timeoutMs) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(url, { ...options, signal: controller.signal });
    return res;
  } catch (err) {
    if (err.name === 'AbortError') throw new Error(`请求超时（超过 ${timeoutMs/1000} 秒）。请尝试调大超时设置，或检查 PDF 文件大小。`);
    throw new Error(`网络错误：${err.message}。请确认网络可访问 api.dify.ai，必要时使用代理。`);
  } finally {
    clearTimeout(timer);
  }
}

async function uploadFile(file) {
  const { base, key, timeout } = cfg();
  const form = new FormData();
  form.append('file', file, file.name);
  form.append('user', 'batch-tool');

  const res = await fetchWithTimeout(
    `${base}/files/upload`,
    { method: 'POST', headers: { 'Authorization': `Bearer ${key}` }, body: form },
    timeout
  );
  const data = await res.json();
  if (!res.ok) throw new Error(`上传失败 (${res.status})：${data.message || JSON.stringify(data)}`);
  return data.id;
}

async function runWorkflow(fileId) {
  const { base, key, timeout } = cfg();

  const res = await fetchWithTimeout(
    `${base}/workflows/run`,
    {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        inputs: {
          pdf_file: { transfer_method: 'local_file', upload_file_id: fileId, type: 'document' }
        },
        response_mode: 'blocking',
        user: 'batch-tool'
      })
    },
    timeout
  );

  const data = await res.json();
  if (!res.ok) throw new Error(`工作流失败 (${res.status})：${data.message || JSON.stringify(data)}`);

  const outputs = data.data?.outputs || {};
  return (
    outputs.literature_card ||
    outputs.text ||
    outputs.result ||
    outputs.output ||
    Object.values(outputs).find(v => typeof v === 'string' && v.length > 10) ||
    JSON.stringify(outputs, null, 2)
  );
}

// ── Process items (shared by "run all" and "retry") ─────────────────────────
async function processItems(items) {
  if (isRunning) return;
  isRunning = true;
  setRunningUI(true);

  const total = items.length;
  let done = 0;

  progressWrap.style.display = 'flex';
  updateProgress(done, total);

  for (const item of items) {
    item.status = 'running';
    item.errMsg = '';
    renderQueue();

    try {
      const fileId = await uploadFile(item.file);
      const card   = await runWorkflow(fileId);
      item.status  = 'done';
      appendResult(item.file.name, card, false);
    } catch (err) {
      item.status = 'error';
      item.errMsg = err.message;
      appendResult(item.file.name, '错误详情：\n' + err.message, true);
      console.error('[文献提取]', item.file.name, err);
    }

    done++;
    renderQueue();
    updateProgress(done, total);
    if (done < total) await sleep(1500);
  }

  isRunning = false;
  setRunningUI(false);
  progressLabel.textContent = `完成 ${done} / ${total}`;
  renderQueue(); // refresh retry button visibility
}

function updateProgress(done, total) {
  progressFill.style.width = total ? (done / total * 100) + '%' : '0%';
  progressLabel.textContent = `${done} / ${total}`;
}

function setRunningUI(running) {
  btnRun.disabled         = running;
  btnClear.disabled       = running;
  btnRetryFailed.disabled = running;
  btnRun.innerHTML = running
    ? `<span class="spinner"></span> 处理中…`
    : `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> 开始提取`;
}

// ── Buttons ────────────────────────────────────────────────────────────────
btnRun.addEventListener('click', () => {
  const { base, key } = cfg();
  if (!base || !key) { alert('请先填写 API Base URL 和 API Key'); return; }
  const pending = files.filter(f => f.status === 'pending');
  if (!pending.length) { alert('没有待处理的文件'); return; }
  processItems(pending);
});

btnRetryFailed.addEventListener('click', () => {
  const failed = files.filter(f => f.status === 'error');
  if (!failed.length) return;
  failed.forEach(f => { f.status = 'pending'; f.errMsg = ''; });
  renderQueue();
  processItems(failed);
});

btnClear.addEventListener('click', () => {
  if (isRunning) return;
  files = [];
  renderQueue();
  progressWrap.style.display = 'none';
});

// ── Result card ────────────────────────────────────────────────────────────
function appendResult(name, content, isError) {
  results.push({ name, content, isError });
  resultsSection.style.display = 'block';

  const card   = document.createElement('div');
  card.className = 'result-card';

  const hdr = document.createElement('div');
  hdr.className = 'result-header';
  hdr.innerHTML = `
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
         stroke="${isError ? 'var(--danger)' : 'var(--success)'}"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
      ${isError
        ? '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'
        : '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'}
    </svg>
    <span class="result-title">${name}</span>
    <span class="badge badge-${isError ? 'error' : 'done'}" style="margin-right:4px">${isError ? '失败' : '完成'}</span>
    <svg class="result-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  `;

  const body = document.createElement('div');
  body.className = 'result-body';
  body.textContent = content;

  hdr.addEventListener('click', () => {
    const open = body.classList.toggle('open');
    hdr.classList.toggle('open', open);
    hdr.querySelector('.result-chevron').classList.toggle('open', open);
  });

  card.appendChild(hdr);
  card.appendChild(body);
  resultsList.appendChild(card);
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── Export ─────────────────────────────────────────────────────────────────
btnExport.addEventListener('click', () => {
  const done = results.filter(r => !r.isError);
  if (!done.length) { alert('暂无成功的提取结果'); return; }
  const sep = '═'.repeat(54);
  const md = done.map((r, i) =>
    `${sep}\n文献卡片 #${i+1} — ${r.name}\n${sep}\n\n${r.content}`
  ).join('\n\n\n');

  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `文献卡片_${new Date().toISOString().slice(0,10)}.md`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
});
</script>
</body>
</html>
